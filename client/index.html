<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strawberry Cow BR - 3D FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a2e;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block;position:absolute;top:0;left:0;z-index:1}
#joinScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0a2e,#2d1b69,#1a0a2e);z-index:100}
#joinScreen h1{font-size:44px;color:#ff88aa;text-shadow:0 0 20px rgba(255,136,170,0.5);margin-bottom:5px}
#joinScreen h2{font-size:16px;color:#cc88ff;margin-bottom:5px}
#joinScreen .mode{font-size:13px;color:#88ff88;letter-spacing:3px;margin-bottom:20px}
#joinScreen input[type=text]{padding:10px 20px;font-size:18px;border:2px solid #cc88ff;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;text-align:center;width:260px;outline:none;margin-bottom:12px}
#joinScreen button{padding:10px 40px;font-size:20px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff88aa,#cc88ff);color:#fff;cursor:pointer;font-weight:bold}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:10;color:#fff;font-size:13px}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:#ff88aa;border-radius:50%;box-shadow:0 0 6px #ff88aa}
#hunger{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:220px;height:20px;background:rgba(0,0,0,0.6);border-radius:4px}
#hungerFill{height:100%;border-radius:4px;background:#44ff44;transition:width 0.15s}
#hungerTxt{position:absolute;width:100%;text-align:center;top:3px;font-size:11px;font-weight:bold;text-shadow:1px 1px #000}
#score{position:absolute;bottom:60px;left:15px;font-size:14px;color:#ffdd44;text-shadow:1px 1px #000}
#weapon{position:absolute;bottom:60px;right:15px;font-size:14px;color:#aaa;text-shadow:1px 1px #000;text-align:right}
#killfeed{position:absolute;top:10px;left:10px;font-size:12px;text-shadow:1px 1px #000}
#playerCount{position:absolute;top:10px;right:10px;font-size:16px;font-weight:bold;color:#ff88aa;text-shadow:1px 1px #000}
#lockMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;display:none;text-align:center;z-index:5;text-shadow:0 0 10px #000;pointer-events:none;padding:30px;background:rgba(0,0,0,0.5);border-radius:12px}
#minimap{position:absolute;top:35px;right:10px;border:1px solid #cc88ff;background:rgba(0,0,0,0.5)}
</style>
</head>
<body>
<div id="joinScreen">
<h1>Strawberry Cow BR</h1>
<h2>Battle Royale</h2>
<div class="mode">[ 3D FPS MODE ]</div>
<input type="text" id="nameIn" placeholder="your name" maxlength="12">
<button id="joinBtn">JOIN GAME</button>
<div style="margin-top:12px;color:#cc88ff;font-size:13px"><label><input type="checkbox" id="botsCheck" checked style="vertical-align:middle"> Include Bots</label></div>
<div style="margin-top:8px;color:#cc88ff;font-size:13px">Volume: <input id="volSlider" type="range" min="0" max="100" value="50" style="width:120px;vertical-align:middle"> <span id="volLbl">50%</span></div>
<div id="serverStatus" style="margin-top:12px;font-size:13px;color:#ffaa44">&#x23F3; connecting...</div>
</div>
<div id="hud">
<div id="crosshair"></div>
<div id="fpsCounter" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.5);text-shadow:1px 1px #000"></div>
<div id="armorBar" style="position:absolute;bottom:67px;left:50%;transform:translateX(-50%);width:220px;height:10px;background:rgba(0,0,0,0.6);border-radius:3px;display:none"><div id="armorFill" style="height:100%;border-radius:3px;background:#5588ff;width:0%"></div><div id="armorTxt" style="position:absolute;width:100%;text-align:center;top:-1px;font-size:8px;text-shadow:1px 1px #000"></div></div>
<div id="hunger"><div id="hungerFill"></div><div id="hungerTxt"></div></div>
<div id="score"></div>
<div id="xpBar" style="position:absolute;bottom:55px;left:50%;transform:translateX(-50%);width:220px;height:10px;background:rgba(0,0,0,0.6);border-radius:3px"><div id="xpFill" style="height:100%;border-radius:3px;background:#cc88ff;width:0%"></div><div id="xpTxt" style="position:absolute;width:100%;text-align:center;top:-1px;font-size:8px;text-shadow:1px 1px #000"></div></div>
<div id="weapon"></div>
<div id="killfeed"></div>
<div id="playerCount"></div>
<canvas id="minimap" width="120" height="90"></canvas>
</div>
<div id="lockMsg" style="display:none!important"></div>
<canvas id="touchDpad" width="130" height="130" style="position:fixed;bottom:10px;left:10px;z-index:60;display:none;opacity:0.5;touch-action:none"></canvas>
<div id="touchShoot" style="position:fixed;bottom:40px;right:30px;width:60px;height:60px;border-radius:50%;background:rgba(255,50,50,0.4);border:2px solid rgba(255,100,100,0.6);z-index:60;display:none;touch-action:none"></div>
<div id="touchDash" style="position:fixed;bottom:40px;right:110px;width:45px;height:45px;border-radius:50%;background:rgba(50,150,255,0.4);border:2px solid rgba(100,180,255,0.6);z-index:60;display:none;font-size:10px;color:#fff;text-align:center;line-height:45px;touch-action:none">DASH</div>
<div id="perkMenu" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);display:none;gap:10px;z-index:80;pointer-events:none"></div>
<style>
.perkCard{background:rgba(26,10,46,0.85);border:2px solid #cc88ff;border-radius:8px;padding:10px 14px;width:180px;text-align:center;pointer-events:none}
</style>
<div id="scopeOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;display:none"><div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,transparent 35%,rgba(0,0,0,0.95) 36%);"></div><div style="position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(255,100,100,0.5)"></div><div style="position:absolute;top:0;left:50%;width:1px;height:100%;background:rgba(255,100,100,0.5)"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border:1px solid rgba(255,100,100,0.6);border-radius:50%"></div></div>
<div id="lowHealthOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;display:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0.4) 100%)"></div>
<div id="hitFlash" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:7;opacity:0;background:rgba(255,0,0,0.3)"></div>
<div id="winScreen" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:90">
<div id="winCrown" style="font-size:80px;animation:winBounce 1s ease-in-out infinite">&#x1F451;</div>
<div id="winName" style="font-size:52px;font-weight:bold;color:#ffee55;text-shadow:0 0 30px rgba(255,238,85,0.6);margin:10px 0"></div>
<div id="winStats" style="font-size:22px;color:#cc88ff;margin-bottom:20px"></div>
<div id="winRestart" style="font-size:18px;color:#aaddaa"></div>
</div>
<style>@keyframes winBounce{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.15) translateY(-10px)}}</style>
<div id="spectateMsg" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:18px;color:#ffaa00;display:none;z-index:50;text-shadow:0 0 10px #000;background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:8px">SPECTATING - waiting for next round</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module" src="bundle.js"></script>
</body>
</html>
